name: Quality

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: this workflow only reads the repo and uploads a build artifact.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a rapid push does not queue two builds.
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run audit:prod
      - run: npm test
      - run: npm run build:vercel
      - run: npm run zip:extension
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: trenith-watch-together-extensions
          path: |
            .output/*.zip
          if-no-files-found: error
          retention-days: 14
